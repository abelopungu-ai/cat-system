<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat System 🎉</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
  text-align:center;
}

/* LOCK */
#lock{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#3b82f6,#9333ea);
  color:white;
  cursor:pointer;
}

/* SCREENS */
.screen{display:none;padding:20px;}
.active{display:block;}

/* CHAT */
.chat{max-width:400px;margin:auto;}
.msg{padding:10px;margin:10px;border-radius:10px;max-width:70%;opacity:0;transition:0.5s;}
.msg.show{opacity:1;}
.me{background:#3b82f6;margin-left:auto;}
.her{background:#1e293b;}
.typing{opacity:0.6;font-style:italic;}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.gallery img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* QUIZ */
.option{
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.option:hover{background:#3b82f6;}

/* MEMORY */
#memoryGrid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  max-width:500px;
  margin:auto;
}
.card{
  width:100px;
  height:100px;
  margin:5px;
  background:#1e293b url('back.jpeg') center/cover no-repeat;
  border-radius:10px;
  cursor:pointer;
  vertical-align:top;
  transition:0.3s transform,0.3s background;
}
.card.flipped{
  transform:rotateY(180deg);
  background-size:cover;
}

/* CONFETTI */
#particles{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:9999;
}

/* NOTIFICATION */
#notify{
  position:fixed;
  top:10px;
  right:10px;
  background:#3b82f6;
  padding:10px 15px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock">
  <h2>Enter Password 🔐</h2>
  <input type="password" id="pass">
  <button id="unlockBtn">Enter</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
  <h1>🎂 Happy Birthday Cat 😛</h1>
  <button onclick="goTo('chat')">💬 Chat</button>
  <button onclick="goTo('gallery')">📸 Gallery</button>
  <button onclick="goTo('quiz')">🎮 Quiz</button>
  <button onclick="goTo('memory')">🧩 Memory</button>
  <button onclick="goTo('secret')">🔐 Secret</button>
  <button onclick="playMusic()">🎵 Music</button>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <h2>Chat 💬</h2>
  <div id="chatBox" class="chat"></div>
  <button onclick="startChat()">Start Chat</button>
  <button onclick="goTo('home')">⬅ Back</button>
</div>

<!-- GALLERY -->
<div id="gallery" class="screen">
  <h2>Memories 📸</h2>
  <div class="gallery">
    <img src="img1.jpeg">
    <img src="img2.jpeg">
    <img src="img3.jpeg">
    <img src="img4.jpeg">
    <img src="img5.jpeg">
    <img src="img6.jpeg">
  </div>
  <button onclick="goTo('home')">⬅ Back</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <h2>Quiz 😏</h2>
  <div id="quizBox"></div>
  <button onclick="goTo('home')">⬅ Back</button>
</div>

<!-- MEMORY -->
<div id="memory" class="screen">
  <h2>Memory Game 🧩</h2>
  <div id="memoryGrid"></div>
  <button onclick="startMemory()">Restart Memory</button>
  <button onclick="goTo('home')">⬅ Back</button>
</div>

<!-- SECRET -->
<div id="secret" class="screen">
  <h2>Secret ❤️</h2>
  <p id="secretText">Locked…</p>
  <button onclick="reveal()">Reveal</button>
  <button onclick="goTo('home')">⬅ Back</button>
</div>

<!-- CONFETTI -->
<canvas id="particles"></canvas>

<!-- NOTIFICATION -->
<div id="notify"></div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const PASSWORD="banana girl";
  let unlockedSecret=false;

  /* UNLOCK */
  document.getElementById("unlockBtn").onclick=()=>{
    let val=document.getElementById("pass").value.trim().toLowerCase();
    if(val===PASSWORD){
      document.getElementById("lock").style.display="none";
      goTo('home');
    } else alert("Wrong password 😭");
  };

  /* NAV */
  window.goTo=function(screen){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(screen).classList.add('active');
  };

  /* CHAT */
  const convo=[
    {text:"Hey Cat 😄",type:"me"},
    {text:"Happy late birthday...gift 🎉",type:"me"},
    {text:"(this is how i'd imagine a reply😭) Wait… you remembered??",type:"her"},
    {text:"Of course I did 😂",type:"me"},
    {text:"You’re actually like a part of me(not weird😭)",type:"me"},
    {text:"Aww stop 😭",type:"her"},
    {text:"have fun with this🎉",type:"me"},
    {text:"idk where you'll use this but have fun😂",type:"me"}
  ];
  window.startChat=function(){
    let i=0;
    const box=document.getElementById("chatBox");
    box.innerHTML="";
    function send(){
      if(i<convo.length){
        let msg=document.createElement("div");
        msg.className="msg "+convo[i].type;
        msg.innerText=convo[i].text;
        box.appendChild(msg);
        setTimeout(()=>msg.classList.add("show"),50);
        i++;
        setTimeout(send,1000);
      }
    }
    send();
  };

  /* QUIZ */
  const quiz=[
    {q:"What do I usually call you?",options:["Cat 😝","Weirdo 😭","nigga🌚","All"],answer:3},
    {q:"Who is more annoying?",options:["Me","You","Both 😭","Depends"],answer:2},
    {q:"Favorite color?",options:["Grey","Green","Yellow","Orange"],answer:0},
    {q:"My birthday?",options:["March 19","Jan 5","Dec 25","July 17"],answer:3},
    {q:"First text?😭",options:["hiii😭","is that jenga?😭","happy birthday","hey"],answer:1},
    {q:"Comfort food?",options:["Pizza","Chips","Chocolate","Ice cream"],answer:0},
    {q:"Drink?",options:["Soda","Coffee","Juice","Water"],answer:3},
    {q:"Emoji I spam?",options:["😂","😭","😛","❤️"],answer:1},
    {q:"Free time?",options:["Gaming","Memes","Music","Sleep"],answer:2},
    {q:"Funny habit?",options:["fumbling","funny😂","overthinking","All"],answer:3}
  ];
  let qi=0,score=0;
  window.loadQuiz=function(){
    let box=document.getElementById("quizBox");
    if(qi>=quiz.length){
      if(score>=7) unlockedSecret=true;
      box.innerHTML=`<h2>Score: ${score}/${quiz.length}</h2>`;
      return;
    }
    let q=quiz[qi];
    box.innerHTML=`<h3>${q.q}</h3>`;
    q.options.forEach((opt,i)=>{
      let d=document.createElement("div");
      d.className="option";
      d.innerText=opt;
      d.onclick=()=>{
        if(i===q.answer) score++;
        qi++;
        loadQuiz();
      };
      box.appendChild(d);
    });
  };
  loadQuiz();

  /* SECRET */
  window.reveal=function(){
    if(!unlockedSecret){
      document.getElementById("secretText").innerText="🚫 Score higher in the quiz 😭";
      return;
    }
    document.getElementById("secretText").innerText=
    "Okay… no jokes here,,I really appreciate you,,I love you nigga ❤️";
    startConfetti();
  };

  /* MUSIC */
  window.playMusic=function(){
    document.getElementById("music").play();
  };

  /* NOTIFICATION */
  window.notify=function(msg){
    const n=document.getElementById("notify");
    n.innerText=msg;
    n.style.display="block";
    setTimeout(()=>{n.style.display="none";},2000);
  };

  /* MEMORY GAME */
  const memoryImages = ["img1.jpeg","img2.jpeg","img3.jpeg","img4.jpeg","img5.jpeg","img6.jpeg"];
  let memGrid=[], firstCard=null, lockMem=false;

  window.startMemory=function(){
    memGrid=[];
    const grid = document.getElementById("memoryGrid");
    grid.innerHTML = "";
    let imgs = [...memoryImages, ...memoryImages];
    imgs.sort(()=>0.5 - Math.random());
    imgs.forEach(src=>{
      let c = document.createElement("div");
      c.className = "card";
      c.dataset.img = src;
      c.onclick = flipCard;
      grid.appendChild(c);
      memGrid.push(c);
    });
  };

  function flipCard(){
    if(lockMem || this.classList.contains("flipped")) return;
    this.style.backgroundImage = `url(${this.dataset.img})`;
    this.classList.add("flipped");
    if(!firstCard){
      firstCard = this;
      return;
    }
    if(firstCard.dataset.img === this.dataset.img){
      firstCard = null;
      checkMemoryComplete();
    } else {
      lockMem = true;
      setTimeout(()=>{
        this.classList.remove("flipped");
        this.style.backgroundImage = "url('back.jpeg')";
        firstCard.classList.remove("flipped");
        firstCard.style.backgroundImage = "url('back.jpeg')";
        firstCard = null;
        lockMem = false;
      },1000);
    }
  }

  function checkMemoryComplete(){
    if(memGrid.every(c=>c.classList.contains("flipped"))){
      unlockedSecret = true;
      startConfetti();
      notify("🎉 Memory completed! Secret unlocked!");
    }
  }

  /* CONFETTI */
  let particles=[],canvas=document.getElementById("particles"),ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;

  function initParticles(){
    for(let i=0;i<100;i++){
      particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3+1,dx:(Math.random()-0.5)*1.5,dy:(Math.random()-0.5)*1.5,color:`hsl(${Math.random()*360},80%,60%)`});
    }
    animateParticles();
  }
  function animateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0||p.x>canvas.width)p.dx*=-1;
      if(p.y<0||p.y>canvas.height)p.dy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
    });
    requestAnimationFrame(animateParticles);
  }
  window.startConfetti=function(){
    for(let i=0;i<150;i++){
      setTimeout(()=>{particles.push({x:Math.random()*canvas.width,y:-10,r:Math.random()*4+2,dx:(Math.random()-0.5)*2,dy:Math.random()*3+2,color:`hsl(${Math.random()*360},90%,60%)`});},i*10);
    }
  };
  initParticles();
});
</script>

</body>
</html>
