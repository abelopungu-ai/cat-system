<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat System OS 😛</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#0f172a;
  padding:20px;
}

.nav-btn{
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border-radius:8px;
  cursor:pointer;
}
.nav-btn:hover{background:#3b82f6;}

/* MAIN */
.main{flex:1;padding:20px;}
.screen{display:none;}
.active{display:block;}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin:10px;
}

/* CHAT */
.msg{padding:10px;margin:10px;border-radius:10px;max-width:60%;}
.me{background:#3b82f6;margin-left:auto;}
.her{background:#334155;}

/* GALLERY */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.gallery img{width:100%;border-radius:10px;cursor:pointer;}

/* VIEWER */
#viewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}
#viewer img{max-width:90%;border-radius:10px;}

/* QUIZ */
.option{
  background:#334155;
  padding:10px;
  margin:10px;
  border-radius:8px;
  cursor:pointer;
}
.option:hover{background:#3b82f6;}

.progress{height:10px;background:#334155;border-radius:10px;}
.progress-bar{height:100%;background:#3b82f6;width:0%;}

/* NOTIFICATION */
#notif{
  position:fixed;
  top:20px;
  right:20px;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  display:none;
}

/* LOCK */
#lock{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

canvas{
  position:fixed;
  top:0;left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="notif"></div>

<!-- LOCK -->
<div id="lock">
  <h2>Password 🔐</h2>
  <input id="pass">
  <button onclick="unlock()">Enter</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="nav-btn" onclick="go('home')">🏠 Home</div>
  <div class="nav-btn" onclick="go('chat')">💬 Chat</div>
  <div class="nav-btn" onclick="go('gallery')">📸 Gallery</div>
  <div class="nav-btn" onclick="go('quiz')">🎮 Quiz</div>
  <div class="nav-btn" onclick="go('secret')">🔐 Secret</div>
  <div class="nav-btn" onclick="playMusic()">🎵 Music</div>
</div>

<!-- MAIN -->
<div class="main">

<div id="home" class="screen active">
  <div class="card">
    <h1>🎂 Happy Birthday Cat 😛</h1>
    <p>This is literally a whole system I made for you 😤</p>
  </div>
</div>

<div id="chat" class="screen">
  <div class="card">
    <div id="chatBox"></div>
    <button onclick="startChat()">Start Chat</button>
  </div>
</div>

<div id="gallery" class="screen">
  <div class="card">
    <div class="gallery">
      <img src="img1.jpeg" onclick="view(this.src)">
      <img src="img2.jpeg" onclick="view(this.src)">
      <img src="img3.jpeg" onclick="view(this.src)">
      <img src="img4.jpeg" onclick="view(this.src)">
      <img src="img5.jpeg" onclick="view(this.src)">
      <img src="img6.jpeg" onclick="view(this.src)">
    </div>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="card">
    <div class="progress"><div id="bar" class="progress-bar"></div></div>
    <div id="quizBox"></div>
  </div>
</div>

<div id="secret" class="screen">
  <div class="card">
    <p id="secretText">Locked...</p>
    <button onclick="reveal()">Reveal</button>
  </div>
</div>

</div>

<!-- VIEWER -->
<div id="viewer" onclick="closeViewer()">
  <img id="fullImg">
</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script>
let unlocked=false;

/* UNLOCK */
function unlock(){
  if(document.getElementById("pass").value.toLowerCase()==="banana girl"){
    document.getElementById("lock").style.display="none";
    notify("Welcome Cat 😛");
    setTimeout(()=>notify("Good morning Cat 😛"),2000);
  } else alert("Wrong 😭");
}

/* NAV */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* NOTIF */
function notify(text){
  let n=document.getElementById("notif");
  n.innerText=text;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",3000);
}

/* CHAT */
function startChat(){
  let convo=["Hey Cat 😄","I made this whole thing btw 😭","You're welcome 😌"];
  let box=document.getElementById("chatBox");
  box.innerHTML="";
  let i=0;
  function send(){
    if(i<convo.length){
      let m=document.createElement("div");
      m.className="msg me";
      m.innerText=convo[i];
      box.appendChild(m);
      i++;
      setTimeout(send,1000);
    }
  }
  send();
}

/* GALLERY */
function view(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("fullImg").src=src;
}
function closeViewer(){
  document.getElementById("viewer").style.display="none";
}

/* QUIZ */
const quiz=[
  {q:"What do I call you?",o:["Cat","Weirdo","All","😭"],a:2},
  {q:"Favorite food?",o:["Pizza","Chips","Chocolate","Ice cream"],a:0}
];

let qi=0,score=0;

function loadQuiz(){
  let box=document.getElementById("quizBox");
  let bar=document.getElementById("bar");
  bar.style.width=(qi/quiz.length*100)+"%";

  if(qi>=quiz.length){
    if(score>=1) unlocked=true;
    box.innerHTML=`Score: ${score}/${quiz.length}`;
    return;
  }

  let q=quiz[qi];
  box.innerHTML=`<h3>${q.q}</h3>`;

  q.o.forEach((opt,i)=>{
    let d=document.createElement("div");
    d.className="option";
    d.innerText=opt;
    d.onclick=()=>{
      if(i===q.a) score++;
      qi++;
      loadQuiz();
    };
    box.appendChild(d);
  });
}
loadQuiz();

/* SECRET */
function reveal(){
  if(!unlocked){
    document.getElementById("secretText").innerText="🚫 Try harder 😭";
    return;
  }
  document.getElementById("secretText").innerText="I actually appreciate you fr ❤️";
  notify("Secret unlocked 🔐");
}

/* MUSIC */
function playMusic(){
  document.getElementById("music").play();
}

/* PARTICLES */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];
for(let i=0;i<100;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{
    ctx.fillStyle="white";
    ctx.fillRect(a.x,a.y,2,2);
    a.y+=0.5;
    if(a.y>c.height)a.y=0;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
